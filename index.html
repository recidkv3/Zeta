<body>

<script>


/* =========================
   CORE VARIABLES
   ========================= */


const screen =
document.getElementById("screen");


const cursor =
document.getElementById("cursor");



let commands = [];




/* =========================
   PART 1 COMMAND SYSTEM
   ========================= */


function command(action){

    commands.push(action);

}




async function run(){

    for(let action of commands){

        await action();

    }

}




/* =========================
   PART 1 BASIC ACTIONS
   ========================= */



async function type(text, speed = 50){

    await typeText({

        text: text,

        color:"#aaa",

        speed:speed,

        importance:"normal"

    });

}




function newline(){

    characterMemory.push(
        createCharacter("\n")
    );

    renderCharacters();

}




function pause(ms){


    return new Promise(

        resolve => setTimeout(resolve, ms)

    );


}





/* =========================
   PART 2 ENGINE GOES HERE
   ========================= */
/* =========================
   PART 2 THINKING ENGINE
   ========================= */


const terminal =
document.getElementById("terminal");



const importantWords = [

    "remember",
    "memory",
    "owner",
    "goodbye",
    "Zeta"

];




// Calculates how much thought a word needs

function wordThinkingTime(word){


    let time = 50;



    // longer words need more processing

    if(word.length >= 7){

        time += 60;

    }



    // important memories are slower

    if(importantWords.includes(word)){

        time += 250;

    }



    return time;

}




// Small pauses caused by punctuation

function punctuationThinking(char){


    if(char === ","){

        return 150;

    }


    if(char === "."){

        return 500;

    }


    if(char === "?"){

        return 400;

    }


    return 0;

}




// Thinking version of type()

async function thoughtType(text){


    let words =
    text.split(" ");



    for(let word of words){



        let speed =
        wordThinkingTime(word);



        await typeText({

            text: word,

            color:"#aaa",

            speed:speed,

            importance:
            importantWords.includes(word)
            ? "memory"
            : "normal"

        });



        await typeText({

            text:" ",

            color:"#aaa",

            speed:80,

            importance:"normal"

        });


    }


}




// Engine pauses before deciding

async function waitForThought(){


    await pause(
        500 + Math.random() * 1000
    );


}




/* =========================
   PART 3 ENGINE GOES HERE
   ========================= */
/* =========================
   PART 3 SELECTION ENGINE
   ========================= */



let textMemory = "";

let cursorPosition = 0;

let selectionStart = null;

let selectionEnd = null;





// Adds text while remembering positions

async function writeMemory(text){


    textMemory += text;


    cursorPosition =
    textMemory.length;


    await refreshScreen();


}




// redraws the terminal

async function refreshScreen(){


    screen.innerHTML = "";



    if(
        selectionStart !== null &&
        selectionEnd !== null
    ){



        let start =
        Math.min(selectionStart, selectionEnd);



        let end =
        Math.max(selectionStart, selectionEnd);



        for(
            let i = 0;
            i < textMemory.length;
            i++
        ){



            if(
                i >= start &&
                i < end
            ){


                screen.innerHTML +=
                "<span class='selection'>" +
                textMemory[i] +
                "</span>";


            }

            else {


                screen.innerHTML +=
                textMemory[i];


            }



        }


    }


    else {


        screen.textContent =
        textMemory;


    }



}






// Move cursor position

function moveCursor(position){


    cursorPosition =
    Math.max(
        0,
        Math.min(
            position,
            textMemory.length
        )
    );


}





// Select text range

function select(start,end){


    selectionStart = start;

    selectionEnd = end;


    refreshScreen();


}





// Select a word

function selectWord(word){



    let position =
    textMemory.indexOf(word);



    if(position !== -1){


        select(
            position,
            position + word.length
        );


    }



}






// Remove selected text

async function erase(){


    if(
        selectionStart === null ||
        selectionEnd === null
    ){

        return;

    }



    let start =
    Math.min(
        selectionStart,
        selectionEnd
    );



    let end =
    Math.max(
        selectionStart,
        selectionEnd
    );



    textMemory =
    textMemory.slice(0,start)
    +
    textMemory.slice(end);



    cursorPosition = start;



    selectionStart = null;

    selectionEnd = null;



    await refreshScreen();


}






// Replace selection

async function replace(text){


    await erase();


    textMemory =
    textMemory.slice(0,cursorPosition)
    +
    text
    +
    textMemory.slice(cursorPosition);



    cursorPosition += text.length;



    await refreshScreen();


}

async function flicker(times = 3){



    for(let i = 0; i < times; i++){



        terminal.classList.add("flicker");


        await pause(80);



        terminal.classList.remove("flicker");


        await pause(80);



    }


}

async function dramaticPause(time){


    await flicker(2);


    await pause(time);


}

   PART 7 SHUTDOWN ENGINE
   ========================= */


async function slowType(text){


    for(let char of text){


        screen.textContent += char;


        await pause(180);

async function shutdown(){


    newline();

    await pause(1000);



    await slowType(
        "Saving memory..."
    );


    newline();

    await slowType(
        "Saving owner..."
    );


    newline();

        "Releasing memory..."

    newline();


    await pause(1500);



    await slowType(
        "Goodbye Zeta."

    await pause(2000);



    cursor.classList.add(
        "cursorFreeze"
    );


    terminal.classList.add(
        "shutdown"

/* =========================
   PART 8 MEMORY ENGINE
   ========================= */


let memory = {

let perfectMode = false;





function remember(name){

async function memoryType(text){



    for(let char of text){

function forget(){


    perfectMode = false;


}
/* =========================
   PART 9 CURSOR ENGINE
   ========================= */


let realCursorPosition = 0;



// Move cursor inside stored text

function setCursor(position){


    realCursorPosition = Math.max(
        0,
        Math.min(
            position,
            screen.textContent.length
        )
    );


}





// Move cursor forward

function moveCursor(amount){


    setCursor(
        realCursorPosition + amount
    );


}




// Insert text where cursor is

async function insertText(text){



    let current =
    screen.textContent;



    screen.textContent =
    current.slice(0, realCursorPosition)
    +
    text
    +
    current.slice(realCursorPosition);



    realCursorPosition += text.length;



}





// Delete character before cursor

async function backspace(){



    if(realCursorPosition <= 0){

        return;

    }



    let current =
    screen.textContent;



    screen.textContent =
    current.slice(0, realCursorPosition - 1)
    +
    current.slice(realCursorPosition);



    realCursorPosition--;


}





// Jump cursor to beginning

function cursorHome(){


    realCursorPosition = 0;


}





// Jump cursor to end

function cursorEnd(){


    realCursorPosition =
    screen.textContent.length;


}

/* =========================
   PART 10 COLOR ENGINE
   ========================= */



let coloredMemory = [];





// Add text with a specific color

async function colorType(text, color = "#aaa"){



    for(let char of text){


        coloredMemory.push({

            character: char,

            color: color

        });



        await renderColors();


        await pause(50);


    }


}






// Draw colored text

async function renderColors(){


    screen.innerHTML = "";



    for(let item of coloredMemory){



        let span =
        document.createElement("span");



        span.textContent =
        item.character;



        span.style.color =
        item.color;



        screen.appendChild(span);



    }



}







// Clear colored memory

function clearColors(){


    coloredMemory = [];


    screen.innerHTML = "";


}







// Special purple typing

async function typePurple(text){


    await colorType(
        text,
        "#b56cff"
    );


}
/* =========================
   PART 11 AUDIO ENGINE
   ========================= */


let audioEnabled = false;



let audioContext;



// Enable audio after interaction

function enableAudio(){


    if(audioEnabled){

        return;

    }


    audioContext =
    new AudioContext();


    audioEnabled = true;


}







// Create tiny mechanical sounds

function beep(
    frequency = 200,
    duration = 50
){



    if(!audioEnabled){

        return;

    }



    let oscillator =
    audioContext.createOscillator();



    let gain =
    audioContext.createGain();



    oscillator.frequency.value =
    frequency;



    oscillator.type =
    "square";



    oscillator.connect(gain);

    gain.connect(
        audioContext.destination
    );



    gain.gain.value =
    0.05;



    oscillator.start();



    setTimeout(()=>{


        oscillator.stop();


    }, duration);



}







// Typing sound

function typeSound(){


    beep(180,30);


}






// Boot sound

function bootSound(){


    beep(300,120);


}






// Glitch sound

// Shutdown sound

/* =========================
   PART 12 CHARACTER ENGINE
   ========================= */


let characterMemory = [];





function createCharacter(
    char,
    options = {}
){


    return {

    character: char,

    color:
    options.color || "#aaa",

    speed:
    options.speed || 50,

    importance:
    options.importance || "normal",

    newline:
    char === "\n"

};


}







async function characterType(text, options = {}){


    for(let char of text){



        let data =
        createCharacter(
            char,
            options
        );



        characterMemory.push(data);



        await renderCharacters();



        await pause(
            data.speed
        );


    }


}

    screen.innerHTML = screen.textContent;
screen.textContent = "";



    for(let item of characterMemory){

}


span.textContent =
item.character;

characterMemory.indexOf(item);

if(
selection.active &&
index >= Math.min(selection.start,selection.end) &&

    }

}

/* =========================
   PART 16 UNIFIED TYPING
   ========================= */


async function typeText(settings){


    let text =
    settings.text || "";


    let color =
    settings.color || "#aaa";


    let speed =
    settings.speed || 50;


    let importance =
    settings.importance || "normal";



    for(let char of text){



        let data =
        createCharacter(

            char,

            {

                color:color,

                speed:speed,

                importance:importance

            }

        );



        characterMemory.push(data);



        await renderCharacters();



        await pause(speed);



    }


}

/* =========================
   PART 14 MEMORY CORRUPTION
   ========================= */


function corruptText(text, chance = 0.08){


    let result = "";



    for(let char of text){



        if(Math.random() < chance){


            let errors = [

                "_",

                "#",

                "?",

                "█"

            ];



            result +=
            errors[
                Math.floor(
                    Math.random()
                    *
                    errors.length
                )
            ];



        }

        else {


            result += char;


        }


    }



    return result;


}









async function corruptedMemory(text){



    let corrupted =
    corruptText(text);



    await thoughtType(

let selection = {

};





function beginSelection(position){

    selection.start = position;

    selection.end = position;

    selection.active = true;

}





function updateSelection(position){

    if(!selection.active){

        return;

    }

    selection.end = position;

}





function clearSelection(){

    selection.active = false;

}





function deleteSelection(){

    if(!selection.active){

        return;

    }

    let start =
    Math.min(
        selection.start,
        selection.end
    );

    let end =
    Math.max(
        selection.start,
        selection.end
    );

    characterMemory.splice(
        start,
        end-start
    );

    realCursorPosition = start;

    clearSelection();

    renderCharacters();

}
